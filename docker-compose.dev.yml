version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db_dev
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: nestjs_backend_dev
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: npm run start:dev
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: nextjs_frontend_dev
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    ports:
      - "4000:3000"
    command: npm run dev
    depends_on:
      - backend
