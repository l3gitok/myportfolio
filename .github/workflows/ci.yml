name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js v24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            apps/frontend/package-lock.json
            apps/backend/package-lock.json

      - name: Install Backend Environment
        working-directory: apps/backend
        run: npm ci

      - name: Install Frontend Environment
        working-directory: apps/frontend
        run: npm ci

      - name: Run Backend Code Linter
        working-directory: apps/backend
        run: npm run lint

      - name: Run Frontend Code Linter
        working-directory: apps/frontend
        run: npm run lint

      - name: Run Backend Unit Tests (Jest)
        working-directory: apps/backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npm run test

      - name: Install Playwright Browsers (Frontend)
        working-directory: apps/frontend
        run: npx playwright install --with-deps chromium

      - name: Run Frontend E2E Tests (Playwright)
        working-directory: apps/frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run test:e2e

      - name: Build Backend
        working-directory: apps/backend
        run: npm run build

      - name: Build Frontend
        working-directory: apps/frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run build
